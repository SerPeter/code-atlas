name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI (true/false)"
        required: true
        default: "false"

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if:
      github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish ==
      'true')
    environment:
      name: pypi
      url: https://pypi.org/p/code-atlas-mcp
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches pyproject.toml version
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG_VERSION="${TAG#v}"
          PKG_VERSION=$(python -c "
          import re, pathlib
          m = re.search(r'^version\s*=\s*\"([^\"]+)\"', pathlib.Path('pyproject.toml').read_text(), re.M)
          print(m.group(1))
          ")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version check passed: $TAG_VERSION"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14-dev"

      - run: uv build

      - uses: pypa/gh-action-pypi-publish@release/v1
