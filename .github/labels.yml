# Type
- name: bug
  color: "d73a4a"
  description: Something isn't working.
- name: feature
  color: "a2eeef"
  description: New feature or request.
- name: enhancement
  color: "84b6eb"
  description: Improvement to existing functionality.
- name: documentation
  color: "0075ca"
  description: Documentation only changes.
- name: refactor
  color: "d4c5f9"
  description: Code refactoring with no behavior change.
- name: performance
  color: "fbca04"
  description: Performance improvement.

# Status
- name: needs-triage
  color: "e4e669"
  description: Needs review and categorization.
- name: confirmed
  color: "0e8a16"
  description: Confirmed and ready to work on.
- name: wontfix
  color: "ffffff"
  description: This will not be worked on.
- name: duplicate
  color: "cfd3d7"
  description: This issue or pull request already exists.

# Priority
- name: "priority: high"
  color: "b60205"
