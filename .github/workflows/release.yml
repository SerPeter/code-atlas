name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI (true/false)"
        required: true
        default: "false"

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if:
      github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish ==
      'true')
    environment:
      name: pypi
      url: https://pypi.org/p/code-atlas-mcp
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14-dev"

      - run: uv build

      - uses: pypa/gh-action-pypi-publish@release/v1
