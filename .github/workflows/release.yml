name: Release

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force bump level (empty = auto-detect from commits)"
        required: false
        type: choice
        options: ["", patch, minor, major]
        default: ""
      prerelease:
        description: "Create a prerelease version"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------- #
  # Job 1: Version bump, changelog, tag, push, GitHub Release
  # ------------------------------------------------------------------- #
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Pin to triggering SHA
        run: git reset --hard ${{ github.sha }}

      - name: Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: "github-actions[bot]"
          git_committer_email: "github-actions[bot]@users.noreply.github.com"
          force: ${{ inputs.force || '' }}
          prerelease: ${{ inputs.prerelease || false }}

      - name: Publish GitHub Release
        if: steps.release.outputs.released == 'true'
        uses: python-semantic-release/publish-action@v10
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}

    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}

  # ------------------------------------------------------------------- #
  # Job 2: Build and publish to PyPI
  # ------------------------------------------------------------------- #
  publish-pypi:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/code-atlas-mcp
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14-dev"

      - run: uv build

      - uses: pypa/gh-action-pypi-publish@release/v1
