services:
  # ---------------------------------------------------------------------------
  # Memgraph — graph database with BM25 + vector search
  # ---------------------------------------------------------------------------
  memgraph:
    image: memgraph/memgraph:3.7.2
    restart: unless-stopped
    ports:
      - "7687:7687" # Bolt protocol
      - "7444:7444" # Monitoring
    volumes:
      - memgraph-data:/var/lib/memgraph
    environment:
      MEMGRAPH_ENTERPRISE_LICENSE: "" # Community edition
    deploy:
      resources:
        limits:
          memory: 4g # Docker-level limit — prevents OS OOM killer
    command: >
      --log-level=WARNING --memory-limit=3800 --storage-wal-enabled=true --storage-snapshot-interval-sec=300
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Valkey — event bus (Redis-compatible) for pipeline streams
  # ---------------------------------------------------------------------------
  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    deploy:
      resources:
        limits:
          memory: 384m
    command: >
      valkey-server --appendonly no --save "" --maxmemory 256mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # TEI — text embeddings inference (self-hosted embeddings)
  # Optional: docker compose --profile tei up -d
  # ---------------------------------------------------------------------------
  tei:
    profiles: [tei]
    restart: unless-stopped
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8
    ports:
      - "8080:80"
    volumes:
      - tei-models:/data
    deploy:
      resources:
        limits:
          cpus: 4
          memory: 4g
    environment:
      MODEL_ID: ${TEI_MODEL:-Qwen/Qwen3-Embedding-0.6B}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  memgraph-data:
  valkey-data:
  tei-models:
